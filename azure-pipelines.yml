# AI Code Review — PR validation pipeline
#
# Prerequisites
# =============
# 1. Publish the tool to a NuGet feed (internal or nuget.org):
#      dotnet pack src/CodeReviewAgent/CodeReviewAgent.csproj -c Release -o ./nupkg
#      dotnet nuget push ./nupkg/rasitha.DevOpsCodeReviewAgent.*.nupkg --source <your-feed>
#
# 2. Create an Azure service connection (service principal) that has:
#      - Azure OpenAI: "Cognitive Services OpenAI User" role on the OpenAI resource
#      - Azure DevOps: added to the project as a member with "Contribute to pull requests"
#        permission on this repository (Project Settings → Repos → Security)
#
# How authentication works
# ========================
# The AzureCLI@2 task logs in with the service connection before running the script.
# - For Azure OpenAI:  DefaultAzureCredential picks up the AZ CLI login automatically.
# - For ADO comments:  AzureCliCredential (Azure.Identity) gets a token for resource
#                      499b84ac-1321-427f-aa17-267ca6975798 (Azure DevOps) using the
#                      same logged-in identity. No PAT or System.AccessToken needed.
#
# The PR context (org, project, repo, PR ID, base branch) is read automatically
# from the Azure Pipelines environment variables that the platform sets on PR builds.

parameters:
  - name: endpoint
    displayName: 'Azure OpenAI endpoint URL (e.g. https://my-resource.openai.azure.com/)'
    type: string

  - name: deployment
    displayName: 'Azure OpenAI deployment name (e.g. gpt-4o)'
    type: string

  - name: failOn
    displayName: 'Fail build when any finding reaches this severity'
    type: string
    default: high
    values:
      - critical
      - high
      - medium
      - low
      - none

  - name: verbose
    displayName: 'Enable verbose logging (prints each agent tool call)'
    type: boolean
    default: false

trigger: none   # Only run on PRs, not on direct pushes

pr:
  branches:
    include:
      - main
      - develop
      - release/*

pool:
  vmImage: ubuntu-latest   # Or windows-latest — see the commented step below

steps:

  # Full history is required so git diff can compare against the target branch.
  # persistCredentials lets the AzureCLI@2 step fetch origin/<base-branch>.
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - task: UseDotNet@2
    displayName: Use .NET 9
    inputs:
      packageType: sdk
      version: 10.0.x

  # Install from nuget.org (or replace --source with your internal feed URL)
  - task: DotNetCoreCLI@2
    displayName: Install ai-code-review
    inputs:
      command: custom
      custom: tool
      arguments: install --global rasitha.DevOpsCodeReviewAgent
    # To install from an internal feed, add:
    #   arguments: install --global rasitha.DevOpsCodeReviewAgent --add-source https://pkgs.dev.azure.com/<org>/<project>/_packaging/<feed>/nuget/v3/index.json
    # To pin a specific published release for reproducibility, add:
    #   --version 1.3.2

  # ── ubuntu-latest (bash) ────────────────────────────────────────────────────
  - task: AzureCLI@2
    displayName: Run AI Code Review
    inputs:
      azureSubscription: your-service-connection-name   # <-- update this
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true   # exposes servicePrincipalId etc. if needed for debugging
      inlineScript: |
        # Fetch the PR target branch so that origin/<base-branch> resolves for git diff.
        # Azure Pipelines checks out a detached merge commit; the target branch ref is
        # not fetched by default even with fetchDepth: 0.
        TARGET="${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
        git fetch origin "${TARGET:-main}"

        ai-code-review \
          --endpoint   "${{ parameters.endpoint }}" \
          --deployment "${{ parameters.deployment }}" \
          --devops-comment \
          --fail-on    "${{ parameters.failOn }}"${{ if parameters.verbose }} \
          --verbose${{ end }}
        # Remove --devops-comment to run in console-only mode (e.g. local dev)
    env:
      # The following are set automatically by Azure Pipelines on PR builds:
      # SYSTEM_PULLREQUEST_TARGETBRANCH       → base branch (auto-detected)
      # SYSTEM_PULLREQUEST_PULLREQUESTID      → PR ID (auto-detected)
      # SYSTEM_TEAMPROJECT                    → project name (auto-detected)
      # SYSTEM_TEAMFOUNDATIONCOLLECTIONURI    → org URL (auto-detected)
      # BUILD_REPOSITORY_NAME                 → repo name (auto-detected)

  # ── windows-latest (PowerShell) — swap pool vmImage and uncomment this ────
  # - task: AzureCLI@2
  #   displayName: Run AI Code Review
  #   inputs:
  #     azureSubscription: your-service-connection-name   # <-- update this
  #     scriptType: ps
  #     scriptLocation: inlineScript
  #     addSpnToEnvironment: true
  #     inlineScript: |
  #       # Fetch the PR target branch so that origin/<base-branch> resolves for git diff.
  #       $target = $env:SYSTEM_PULLREQUEST_TARGETBRANCH -replace '^refs/heads/', ''
  #       if (-not $target) { $target = 'main' }
  #       git fetch origin $target
  #
  #       ai-code-review `
  #         --endpoint   "${{ parameters.endpoint }}" `
  #         --deployment "${{ parameters.deployment }}" `
  #         --devops-comment `
  #         --fail-on    "${{ parameters.failOn }}"${{ if parameters.verbose }} `
  #         --verbose${{ end }}
