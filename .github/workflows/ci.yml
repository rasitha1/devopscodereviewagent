name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/CodeReviewAgent/CodeReviewAgent.csproj

      - name: Build
        run: dotnet build src/CodeReviewAgent/CodeReviewAgent.csproj -c Release --no-restore

      - name: Test
        run: dotnet test CodeReviewAgent.sln -c Release --no-build --verbosity normal

      - name: Verify pack
        run: dotnet pack src/CodeReviewAgent/CodeReviewAgent.csproj -c Release --no-build -o ./nupkg
