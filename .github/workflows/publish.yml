name: Publish to NuGet

# Trigger by pushing a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub Release
      id-token: write    # required for NuGet Trusted Publishing OIDC token issuance

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Strip the leading "v" from the tag to get the NuGet version (v1.2.3 → 1.2.3)
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/CodeReviewAgent/CodeReviewAgent.csproj

      - name: Build
        run: dotnet build src/CodeReviewAgent/CodeReviewAgent.csproj -c Release --no-restore

      - name: Test
        run: dotnet test CodeReviewAgent.sln -c Release --no-build --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/CodeReviewAgent/CodeReviewAgent.csproj \
            -c Release \
            --no-build \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./nupkg

      # Exchanges the GitHub OIDC token for a short-lived NuGet.org API key.
      # The nuget.org Trusted Publisher policy must be configured with:
      #   Repository owner: rasitha1
      #   Repository:       DevOpsCodeReviewAgent
      #   Workflow file:    publish.yml
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org profile username (not email) — store as a GitHub secret

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./nupkg/*.snupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: ./nupkg/*.nupkg
